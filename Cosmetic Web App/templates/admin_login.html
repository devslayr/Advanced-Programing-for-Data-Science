<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authentication - GlowHaus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4">
                    <div class="card-body">
                        <h3 class="fw-bold mb-1 text-dark">GlowHaus Admin</h3>
                        <p class="text-muted small mb-4">Please log in to access telemetry analytics.</p>
                        
                        {% if error %}
                        <div class="alert alert-danger py-2 small" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}

                        <form action="/admin/login" method="POST">
                            <div class="mb-3">
                                <label for="admin_username" class="form-label small fw-semibold">Username</label>
                                <input type="text" id="admin_username" name="username" class="form-control" required autocomplete="off">
                            </div>
                            <div class="mb-4">
                                <label for="admin_password" class="form-label small fw-semibold">Password</label>
                                <input type="password" id="admin_password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2">Authenticate</button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="/" class="text-secondary small text-decoration-none">← Return to Storefront</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
