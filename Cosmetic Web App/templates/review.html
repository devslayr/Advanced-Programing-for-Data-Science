<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Review</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 22px 60px; border-bottom: 1px solid #eeeeee; background: white;">
        <a href="/" class="logo" style="font-size: 28px; font-weight: 700; letter-spacing: 1px; color: #111111; text-decoration: none;">GlowHaus</a>

        <form class="search-bar" method="GET" action="/search" style="display: flex; gap: 10px;">
            <input
                type="text"
                name="query"
                placeholder="Search beauty products, brands..."
                value="{{ query or '' }}"
                style="width: 320px; padding: 12px 15px; border: 1px solid #dddddd; border-radius: 30px; font-size: 14px;"
            >
            <button type="submit" style="padding: 12px 20px; border: none; border-radius: 30px; background: black; color: white; cursor: pointer;">Search</button>
        </form>

        <div class="nav-links" style="display: flex; gap: 24px; align-items: center;">
            <a href="#" style="text-decoration: none; color: #555555; font-size: 15px; font-weight: 500;">New In</a>
            <a href="#" style="text-decoration: none; color: #555555; font-size: 15px; font-weight: 500;">Brands</a>
            
            {% if session and session.get('username') %}
                <span class="user-greeting" style="font-weight: 600; color: #333; margin-right: 10px; font-size: 15px;">Hello, {{ session.get('username') }}!</span>
                <a href="/logout" style="color: #e74c3c; text-decoration: none; font-size: 15px; font-weight: 500;">Log Out</a>
            {% else %}
                <a href="/login" style="text-decoration: none; color: #555555; font-size: 15px; font-weight: 500;">Log In</a>
                <a href="/signup" style="font-weight: 600; text-decoration: none; color: #555555; font-size: 15px;">Sign Up</a>
            {% endif %}
            <a href="/admin/login" style="padding: 6px 14px; background-color: #000; color: #fff; border-radius: 4px; text-decoration: none; font-weight: 500; font-size: 0.85rem;">Admin Portal</a>
        </div>
    </nav>

    <section class="review-form-container">

        <h2>Create Review</h2>

        <form method="POST">

            <div class="form-group">
                <label for="review_title">Review Title</label>
                <input type="text" id="review_title" name="review_title" placeholder="Summarize your experience..." required>
            </div>

            <div class="form-group">
                <label for="review_text">Review Description</label>
                <textarea id="review_text" name="review_text" placeholder="Share details of your beauty experience... How does it feel? Long-lasting?" required></textarea>
            </div>

            <div class="form-group">
                <label for="review_rating">Rating</label>
                <select id="review_rating" name="review_rating">
                    <option value="1">1 ⭐</option>
                    <option value="2">2 ⭐</option>
                    <option value="3">3 ⭐</option>
                    <option value="4">4 ⭐</option>
                    <option value="5" selected>5 ⭐</option>
                </select>
            </div>

            <div class="prediction-box" id="prediction-box-container" style="background-color: #f9f9f9; padding: 20px; border-radius: 6px; border: 1px solid #eeeeee; margin-bottom: 24px; transition: all 0.3s ease;">
                <h3 style="font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; color: #333;">AI Recommendation Prediction</h3>
                <div id="ai-prediction-result" class="prediction-result" style="font-size: 16px; font-weight: 700; color: #111111; transition: color 0.2s ease;">
                    Awaiting dynamic calculation tokens...
                </div>
            </div>

            <div class="form-group">
                <label for="is_a_buyer">Buyer Verification Status</label>
                <select id="is_a_buyer" name="is_a_buyer">
                    <option value="Verified Buyer">Verified Buyer</option>
                    <option value="Guest User">Guest User</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">
                Submit Review
            </button>

        </form>

    </section>

    <footer style="text-align: center; padding: 30px 0; margin-top: 80px; border-top: 1px solid #eeeeee;">
        <p style="color: #111111; font-size: 0.95rem; margin-bottom: 0;">GlowHaus Beauty &copy; 2026</p>
        <p><a href="/admin/login" style="color: #666; text-decoration: none; font-size: 0.85rem; display: block; margin-top: 5px;">System Management Portal</a></p>
    </footer>

    <script>
        const titleInput = document.getElementById('review_title');
        const predictionDisplay = document.getElementById('ai-prediction-result');
        const containerBox = document.getElementById('prediction-box-container');
        let typingTimer;

        titleInput.addEventListener('input', function() {
            clearTimeout(typingTimer);
            
            // Wait 400ms after the user stops typing to avoid overloading the pipeline server
            typingTimer = setTimeout(() => {
                const currentText = titleInput.value.trim();
                
                if (currentText.length === 0) {
                    predictionDisplay.innerText = "Awaiting dynamic calculation tokens...";
                    predictionDisplay.style.color = "#111111";
                    containerBox.style.backgroundColor = "#f9f9f9";
                    containerBox.style.borderColor = "#eeeeee";
                    return;
                }

                predictionDisplay.innerText = "Processing matrix...";
                predictionDisplay.style.color = "#888888";

                // Fetch real-time decision metrics from our live API endpoint
                fetch('/api/predict-title', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: currentText })
                })
                .then(response => response.json())
                .then(data => {
                    // Normalize the response text for an exact match safety profile
                    const predictionResult = data.prediction.trim();
                    predictionDisplay.innerText = predictionResult;

                    // Task 2 Fix: Match against literal text string outputs instead of raw integers
                    if (predictionResult === "Verified Buyer") {
                        predictionDisplay.style.color = "#155724"; // Crisp Success Text
                        containerBox.style.backgroundColor = "#d4edda"; // Light Pastel Green
                        containerBox.style.borderColor = "#c3e6cb";
                    } else if (predictionResult === "Guest User / Anomaly Detected") {
                        predictionDisplay.style.color = "#721c24"; // Crisp Alert Text
                        containerBox.style.backgroundColor = "#f8d7da"; // Light Pastel Red
                        containerBox.style.borderColor = "#f5c6cb";
                    } else {
                        // Neutral or loading strings
                        predictionDisplay.style.color = "#111111";
                        containerBox.style.backgroundColor = "#f9f9f9";
                        containerBox.style.borderColor = "#eeeeee";
                    }
                })
                .catch(err => {
                    console.error("ML API Pipeline Error:", err);
                    predictionDisplay.innerText = "Prediction unavailable";
                    predictionDisplay.style.color = "#721c24";
                    containerBox.style.backgroundColor = "#f8d7da";
                });
            }, 400);
        });
    </script>

</body>
</html>
